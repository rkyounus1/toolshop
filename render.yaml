services:
  # PostgreSQL Database (free tier)
  - type: postgresql
    name: toolshop-db
    plan: free
    ipAllowList: []

  # Laravel API (backend)
  - type: web
    name: toolshop-api
    runtime: docker
    plan: free
    dockerfilePath: ./_docker/web.docker   # Adjust if needed
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: toolshop-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: toolshop-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: toolshop-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: toolshop-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: toolshop-db
          property: password
      - key: APP_KEY
        sync: false
    healthCheckPath: /api/health

  # Angular UI (frontend)
  - type: static
    name: toolshop-ui
    buildCommand: cd sprint5/UI && npm install && npm run build
    publishPath: sprint5/UI/dist
    envVars:
      - key: API_URL
        value: https://toolshop-api.onrender.com